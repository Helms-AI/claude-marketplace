<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Console</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Core Styles (CSS custom properties + base resets) -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tool-cards.css">

    <!-- External Libraries -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Lit Web Components - Import Map (No Build Step) -->
    <script type="importmap">
    {
        "imports": {
            "lit": "https://cdn.jsdelivr.net/npm/lit@3/+esm",
            "lit/": "https://cdn.jsdelivr.net/npm/lit@3/",
            "lit/decorators.js": "https://cdn.jsdelivr.net/npm/lit@3/decorators.js/+esm",
            "lit/directives/repeat.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/repeat.js/+esm",
            "lit/directives/class-map.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/class-map.js/+esm",
            "lit/directives/style-map.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/style-map.js/+esm",
            "lit/directives/unsafe-html.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/unsafe-html.js/+esm",
            "lit/directives/until.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/until.js/+esm",
            "lit/directives/ref.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/ref.js/+esm",
            "lit/directives/unsafe-svg.js": "https://cdn.jsdelivr.net/npm/lit@3/directives/unsafe-svg.js/+esm",
            "@preact/signals-core": "https://cdn.jsdelivr.net/npm/@preact/signals-core@1/+esm",
            "lucide": "https://cdn.jsdelivr.net/npm/lucide@0.469.0/dist/esm/lucide.js/+esm"
        }
    }
    </script>
</head>
<body>
    <!--
        Simplified Declarative Index
        ============================
        The entire dashboard UI is now a single Lit Web Component.
        All layout, state, and interactions are handled by components.

        Component Hierarchy:
        - dashboard-shell (root)
          ├── dashboard-titlebar (top bar)
          ├── sidebar-panel (left sidebar)
          │   ├── changeset-tree
          │   ├── agent-tree
          │   └── skill-tree
          ├── editor-area (main content)
          │   ├── tab-bar
          │   ├── terminal-view | welcome-panel | conversation-stream | graph-view
          │   └── [dynamic content based on active tab]
          ├── bottom-panel (activity, timeline, console)
          └── status-bar (connection, tasks, version)

        Modal Components (portals):
        - dash-command-palette (global search)
        - dash-modal (agent detail, skill detail, process manager)

        State Management:
        - All state is managed via Preact Signals in store/app-state.js
        - Components subscribe to signals they need
        - Services handle API calls and business logic
    -->

    <!-- Root Dashboard Component -->
    <dashboard-shell id="dashboardApp"></dashboard-shell>

    <!-- Global Command Palette (portal) -->
    <dash-command-palette id="commandPalette"></dash-command-palette>

    <!-- Module Entry Point -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
